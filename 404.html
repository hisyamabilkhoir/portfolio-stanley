<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050A14">
  <title>Page Not Found — Kaisar Stanley Eleazar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Inter', sans-serif;
      background: #050A14;
      color: #E8E4DC;
      padding: 24px;
    }
    .code {
      font-family: 'Cinzel', serif;
      font-size: clamp(4rem, 15vw, 10rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #C9A74E;
      line-height: 1;
      margin-bottom: 16px;
      text-shadow: 0 0 80px rgba(201,167,78,0.15);
    }
    .title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 3vw, 1.6rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 24px;
      color: #9A978F;
    }
    .desc {
      font-size: 0.95rem;
      color: #9A978F;
      max-width: 400px;
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 36px;
      border: 1px solid #C9A74E;
      color: #C9A74E;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.3s, color 0.3s;
    }
    .btn:hover { background: #C9A74E; color: #050A14; }
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
      mix-blend-mode: overlay;
    }
    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(5,10,20,0.65) 100%);
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="code">404</div>
  <h1 class="title">Scene Not Found</h1>
  <p class="desc">The scene you're looking for doesn't exist in this production. Let's get you back to the main story.</p>
  <a href="/" class="btn">Back to Home</a>
</body>
</html>
